# 自动编译 Windows 端 .exe 的 CI pipeline。
#
# 每次 push 同时出 Local 和 Pro 两个版本 (matrix build):
#   - ITforceMarkdown.exe       (Local 品牌)
#   - ITforceMarkdown.Pro.exe   (Pro 品牌)
# 通过 dotnet publish -p:BuildFlavor=Local | Pro 切换 csproj 里的条件 PropertyGroup,
# 自动换 AssemblyName / Product / Icon / 编译常量。
#
# 触发条件:
#   - push 到 main 分支     → 编译两个版本, artifact 上传 (保留 30 天)
#   - 提交 vX.Y.Z 这种 tag  → 同时创建 GitHub Release, 两个 .exe 都挂上去
#   - 手动 (workflow_dispatch)
name: Build Windows

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 25

    strategy:
      fail-fast: false
      matrix:
        flavor: [Local, Pro]

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup .NET 8 SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore NuGet packages
        run: dotnet restore src/ITforceMarkdown/ITforceMarkdown.csproj

      - name: Compute version
        id: version
        shell: pwsh
        run: |
          if ($env:GITHUB_REF -match '^refs/tags/v(\d+\.\d+\.\d+)$') {
            $v = $matches[1]
          } else {
            $v = "0.1.$env:GITHUB_RUN_NUMBER"
          }
          Write-Host "Publishing version: $v"
          echo "version=$v" >> $env:GITHUB_OUTPUT

      - name: Publish (${{ matrix.flavor }})
        run: |
          dotnet publish src/ITforceMarkdown/ITforceMarkdown.csproj `
            --configuration Release `
            --runtime win-x64 `
            --self-contained true `
            -p:PublishSingleFile=true `
            -p:IncludeNativeLibrariesForSelfExtract=true `
            -p:EnableCompressionInSingleFile=true `
            -p:BuildFlavor=${{ matrix.flavor }} `
            -p:Version=${{ steps.version.outputs.version }} `
            -p:AssemblyVersion=${{ steps.version.outputs.version }}.0 `
            -p:FileVersion=${{ steps.version.outputs.version }}.0 `
            --output publish/${{ matrix.flavor }}

      - name: Trim publish output
        shell: pwsh
        run: |
          Get-ChildItem publish/${{ matrix.flavor }} -Recurse -Include *.pdb | Remove-Item -Force
          Get-ChildItem publish/${{ matrix.flavor }} | Format-Table Name, Length

      - name: Compute artifact name
        id: artifact
        shell: pwsh
        run: |
          if ("${{ matrix.flavor }}" -eq "Pro") {
            $name = "ITforceMarkdown.Pro-windows-x64-v${{ steps.version.outputs.version }}"
          } else {
            $name = "ITforceMarkdown-windows-x64-v${{ steps.version.outputs.version }}"
          }
          echo "name=$name" >> $env:GITHUB_OUTPUT

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.artifact.outputs.name }}
          path: publish/${{ matrix.flavor }}/
          retention-days: 30
          if-no-files-found: error

      # 打 tag 时 把这个 flavor 的 .exe 挂到 Release。
      # 因为 matrix 跑 2 次, 两个 flavor 都会 append.
      - name: Create / append GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          name: ITforce Markdown v${{ steps.version.outputs.version }}
          tag_name: ${{ github.ref_name }}
          files: |
            publish/${{ matrix.flavor }}/*.exe
          generate_release_notes: true
          draft: false
          prerelease: false
